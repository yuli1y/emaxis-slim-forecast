name: Update forecast snapshot

on:
  schedule:
    # 6:30, 18:30, and 23:30 JST (Fractions for reliability). GitHub Actions uses UTC.
    - cron: "17 21 * * *"
    - cron: "27 21 * * *"
    - cron: "17 9 * * *"
    - cron: "27 9 * * *"
    - cron: "17 14 * * *"
    - cron: "27 14 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: update-forecast-snapshot
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Update snapshot
        run: python scripts/update_snapshot.py
      - name: Commit snapshot
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/snapshot.json
          git diff --cached --quiet || git commit -m "Update forecast snapshot"
          git push
