name: Update forecast snapshot

on:
  schedule:
    # 6:00, 18:00, and 23:00 JST. GitHub Actions uses UTC.
    - cron: "0 21 * * *"
    - cron: "10 21 * * *"
    - cron: "20 21 * * *"
    - cron: "30 21 * * *"
    - cron: "0 9 * * *"
    - cron: "10 9 * * *"
    - cron: "20 9 * * *"
    - cron: "30 9 * * *"
    - cron: "0 14 * * *"
    - cron: "10 14 * * *"
    - cron: "20 14 * * *"
    - cron: "30 14 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: update-forecast-snapshot
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Update snapshot
        run: python scripts/update_snapshot.py
      - name: Commit snapshot
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/snapshot.json
          git diff --cached --quiet || git commit -m "Update forecast snapshot"
          git push
