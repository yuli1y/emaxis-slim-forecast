name: Update forecast snapshot

on:
  schedule:
    # JST 6:17 and 6:27 on weekdays (Mon-Fri JST = Sun-Thu UTC due to +9h offset)
    - cron: "17 21 * * 0-4"
    - cron: "27 21 * * 0-4"
    # JST 18:17 and 18:27 on weekdays
    - cron: "17 9 * * 1-5"
    - cron: "27 9 * * 1-5"
    # JST 23:17 and 23:27 on weekdays
    - cron: "17 14 * * 1-5"
    - cron: "27 14 * * 1-5"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: update-forecast-snapshot
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Update snapshot
        run: python scripts/update_snapshot.py
      - name: Commit snapshot
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/snapshot.json
          git diff --cached --quiet || git commit -m "Update forecast snapshot"
          git push
