name: Update forecast snapshot

on:
  schedule:
    # 10:00 and 23:00 JST. GitHub Actions uses UTC.
    - cron: "0 1 * * *"
    - cron: "0 14 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Update snapshot
        run: python scripts/update_snapshot.py
      - name: Commit snapshot
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/snapshot.json
          git diff --cached --quiet || git commit -m "Update forecast snapshot"
          git push
