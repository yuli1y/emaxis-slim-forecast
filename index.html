<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#0f766e" />
    <title>eMAXIS Slim オルカン 予想基準価額</title>
    <link rel="icon" href="icon.svg" type="image/svg+xml" />
    <link rel="apple-touch-icon" href="icon.svg" />
    <link rel="manifest" href="site.webmanifest" />
    <link rel="stylesheet" href="styles.css?v=20260611-chart" />
  </head>
  <body>
    <main class="shell">
      <section class="summary">
        <div>
          <p class="eyebrow">eMAXIS Slim 全世界株式</p>
          <h1>オール・カントリー<br>予想基準価額</h1>
        </div>
        <button
          id="refresh"
          class="icon-button"
          type="button"
          aria-label="最新データを再読み込み"
          title="最新データを再読み込み"
        >
          <span aria-hidden="true">↻</span>
        </button>
      </section>

      <section class="chart-panel" aria-label="1ヶ月チャート">
        <div class="chart-head">
          <div>
            <span>1ヶ月チャート</span>
            <strong id="chart-latest">--</strong>
          </div>
          <span id="chart-range">--</span>
        </div>
        <svg class="chart" viewBox="0 0 640 180" role="img" aria-label="直近1ヶ月の基準価額チャート">
          <path id="chart-area" class="chart-area" d=""></path>
          <path id="chart-line" class="chart-line" d=""></path>
        </svg>
      </section>

      <section class="grid">
        <article class="panel main-panel">
          <div class="panel-head">
            <span>直近基準価額</span>
            <span id="nav-date">--</span>
          </div>
          <div class="nav-row">
            <strong id="latest-nav">--</strong>
            <span id="actual-change" class="change">--</span>
          </div>
        </article>

        <article class="panel forecast" data-slot="06:30">
          <div class="panel-head">
            <span id="forecast-6-label">昼の予想 (6:30〜18:30)</span>
            <span class="badge">予想</span>
          </div>
          <strong id="forecast-6">--</strong>
          <span id="change-6" class="change">--</span>
          <span id="time-6" class="forecast-time">--</span>
        </article>

        <article class="panel forecast" data-slot="18:30">
          <div class="panel-head">
            <span id="forecast-18-label">夜の予想 (18:30〜23:30)</span>
            <span class="badge">予想</span>
          </div>
          <strong id="forecast-18">--</strong>
          <span id="change-18" class="change">--</span>
          <span id="time-18" class="forecast-time">--</span>
        </article>
      </section>

      <section class="market-strip" aria-label="推計材料">
        <div>
          <span>ACWI</span>
          <strong id="acwi-return">--</strong>
        </div>
        <div>
          <span>USD/JPY</span>
          <strong id="fx-return">--</strong>
        </div>
        <div>
          <span>更新時刻</span>
          <strong id="as-of">--</strong>
          <button id="trigger-workflow" class="trigger-button" type="button">今すぐ更新</button>
        </div>
      </section>

      <section class="note">
        <p id="method">データ取得中です。</p>
        <p class="schedule">予想基準価額は午前6時30分・午後6時30分、直近基準価額は午後11時30分にも自動更新されます。右上のボタンは最新データの再読み込みです。</p>
        <p class="risk">投資判断用の正式価格ではありません。表示値は実際の基準価額と大きくずれる可能性があります。</p>
      </section>

      <p id="error" class="error" hidden></p>
    </main>

    <script src="app.js?v=20260613-error"></script>
  </body>
</html>
